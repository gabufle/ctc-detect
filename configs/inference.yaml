# CTC-Detect Model Inference Configuration

inference:
  # Batch size for inference (adjust based on GPU memory)
  batch_size: 32

  # Max sequence length (must match tokenize.model_input_size)
  max_seq_len: 2048

  # Uncertainty threshold (max softmax probability < this = uncertain)
  uncertainty_threshold: 0.6

  # Classification threshold for CTC call
  classification_threshold: 0.5