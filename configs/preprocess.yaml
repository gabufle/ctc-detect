# CTC-Detect Preprocessing Configuration
# All QC filtering, normalization, and tokenization parameters.
# Edit this file to customize preprocessing without modifying code.

# Quality Control (QC) filtering thresholds
qc:
  # Minimum number of genes detected per cell (n_genes_by_counts)
  min_genes: 200

  # Maximum number of genes detected per cell (filters doublets/multiplets)
  max_genes: 6000

  # Maximum percentage of mitochondrial gene counts
  # High MT% indicates dying/stressed cells
  max_pct_mt: 20.0

  # Optional: filter by total UMI counts
  min_counts: 500
  max_counts: 50000

  # Optional: filter by ribosomal gene percentage
  # max_pct_ribo: 50.0

# Normalization parameters
normalize:
  # Target sum for normalize_total (1e4 = 10,000 = CPM-like)
  target_sum: 10000

  # Apply log1p after normalization
  log1p: true

  # Highly variable gene selection for UMAP (not used in tokenization)
  highly_variable_genes:
    n_top_genes: 2000
    flavor: "seurat_v3"

# Gene symbol to Ensembl ID mapping
gene_mapping:
  # If True, require all genes to map (strict mode)
  # If False, drop unmapped genes with a warning
  strict: false

  # Minimum fraction of genes that must map successfully
  min_mapping_rate: 0.1

  # Warn if mapping rate below this threshold
  warn_mapping_rate: 0.5

# Tokenization parameters (Geneformer TranscriptomeTokenizer)
tokenize:
  # Geneformer model input size (max sequence length)
  # V1 models: 2048, V2 models: 4096
  model_input_size: 2048

  # Use special tokens (CLS, etc.) - False for V1
  special_token: false

  # Collapse duplicate gene IDs (sum counts)
  collapse_gene_ids: true

  # Geneformer model version: "V1" or "V2"
  model_version: "V1"

  # Target sum for tokenizer normalization (independent of sc.pp.normalize_total)
  target_sum: 10000

  # Number of processes for parallel tokenization
  nproc: 4

  # File format for tokenizer input
  file_format: "h5ad"

  # Whether to keep uncropped input_ids
  keep_uncropped_input_ids: false

# UMAP visualization parameters
umap:
  # Number of highly variable genes for UMAP
  n_top_genes: 2000

  # UMAP parameters
  n_neighbors: 15
  min_dist: 0.5
  spread: 1.0
  random_state: 42

  # Number of panels in visualization
  # 4 = probability, prediction, uncertainty, expression overlay
  n_panels: 4

# Model inference parameters
inference:
  # Batch size for inference (adjust based on GPU memory)
  batch_size: 32

  # Max sequence length (must match tokenize.model_input_size)
  max_seq_len: 2048

  # Uncertainty threshold (max softmax probability < this = uncertain)
  uncertainty_threshold: 0.6

  # Classification threshold for CTC call
  classification_threshold: 0.5

# Output parameters
output:
  # Save intermediate AnnData after preprocessing
  save_preprocessed: false

  # Save tokenized dataset
  save_tokenized: false

  # Save raw logits in addition to probabilities
  save_logits: false

  # Compression for output CSVs
  compression: null  # null, "gzip", "bz2", "xz"