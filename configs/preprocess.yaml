# CTC-Detect Preprocessing Configuration
# Main config file that references all sub-configs

# Include sub-configurations
# Each sub-config can also be loaded independently
# Example: load_preprocess_config("configs/qc.yaml")

# Quality Control (QC) filtering thresholds
qc:
  min_genes: 200
  max_genes: 6000
  max_pct_mt: 20.0
  min_counts: 500
  max_counts: 50000
  min_cells: 10

# Normalization parameters
normalize:
  target_sum: 10000
  log1p: true
  highly_variable_genes:
    n_top_genes: 2000
    flavor: "seurat_v3"

# Gene symbol to Ensembl ID mapping
gene_mapping:
  strict: false
  min_mapping_rate: 0.1
  warn_mapping_rate: 0.5

# Tokenization parameters (Geneformer TranscriptomeTokenizer)
tokenize:
  model_input_size: 2048
  special_token: false
  collapse_gene_ids: true
  model_version: "V1"
  target_sum: 10000
  nproc: 4
  file_format: "h5ad"
  keep_uncropped_input_ids: false

# UMAP visualization parameters
umap:
  n_top_genes: 2000
  n_neighbors: 15
  min_dist: 0.5
  spread: 1.0
  random_state: 42
  n_panels: 4

# Model inference parameters
inference:
  batch_size: 32
  max_seq_len: 2048
  uncertainty_threshold: 0.6
  classification_threshold: 0.5

# Output parameters
output:
  save_preprocessed: false
  save_tokenized: false
  save_logits: false
  compression: null